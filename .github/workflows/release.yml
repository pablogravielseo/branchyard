name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-13
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libssl-dev pkg-config

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf branchyard-${{ github.ref_name }}-${{ matrix.target }}.tar.gz branchyard
          mv branchyard-${{ github.ref_name }}-${{ matrix.target }}.tar.gz ../../../

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf branchyard-${{ github.ref_name }}-${{ matrix.target }}.tar.gz branchyard
          mv branchyard-${{ github.ref_name }}-${{ matrix.target }}.tar.gz ../../../

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: branchyard-${{ matrix.target }}
          path: branchyard-${{ github.ref_name }}-${{ matrix.target }}.tar.gz

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create install script
        run: |
          cat > install.sh << 'EOF'
          #!/bin/sh
          set -e

          REPO="pablogravielseo/branchyard"
          VERSION="${1:-latest}"

          OS=$(uname -s | tr '[:upper:]' '[:lower:]')
          ARCH=$(uname -m)

          case "$OS" in
            darwin) OS="apple-darwin" ;;
            linux)  OS="unknown-linux-gnu" ;;
            *) echo "Unsupported OS: $OS" && exit 1 ;;
          esac

          case "$ARCH" in
            x86_64)  ARCH="x86_64" ;;
            arm64|aarch64) ARCH="aarch64" ;;
            *) echo "Unsupported arch: $ARCH" && exit 1 ;;
          esac

          TARGET="${ARCH}-${OS}"

          if [ "$VERSION" = "latest" ]; then
            VERSION=$(curl -fsSL "https://api.github.com/repos/${REPO}/releases/latest" | grep '"tag_name"' | sed 's/.*"tag_name": *"\(.*\)".*/\1/')
          fi

          URL="https://github.com/${REPO}/releases/download/${VERSION}/branchyard-${VERSION}-${TARGET}.tar.gz"

          echo "Downloading branchyard ${VERSION} for ${TARGET}..."
          curl -fsSL "$URL" | tar xz -C /tmp
          sudo mv /tmp/branchyard /usr/local/bin/branchyard
          echo "branchyard installed to /usr/local/bin/branchyard"
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*.tar.gz
            install.sh
          generate_release_notes: true
